<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add kid · PIN · Kids UX Beta</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body style="--accent:#8b5cf6;">
<a class="shell-back" href="index.html">All prototypes</a>

<div class="phone">
  <div class="wizard">
    <div class="steps">
      <div class="s done"></div>
      <div class="s active"></div>
      <div class="s"></div>
    </div>
    <div class="eyebrow">Step 2 of 3</div>
    <h1 style="margin-top:10px;">Set a<br><span class="accent">parent PIN</span>.</h1>
    <p class="tag">Your kid needs this to switch profiles or leave kid mode. Don't pick a birthday.</p>

    <div class="field" style="margin-top:36px;">
      <label>4-digit PIN</label>
      <div class="pin-row">
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
      </div>
    </div>

    <div class="field">
      <label>Confirm</label>
      <div class="pin-row">
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
        <div class="pin-cell filled">•</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <a class="btn btn-primary" href="parent-create-kid-coppa.html">Continue</a>
  </div>
</div>
</body>
</html>
