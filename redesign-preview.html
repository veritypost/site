<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verity Post — Redesign Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --vp-bg:#f7f4ef;--vp-surface:#ffffff;
    --vp-text:#171717;--vp-text-muted:#66615a;--vp-text-soft:#8a8379;
    --vp-border:#ded8ce;--vp-border-soft:#eee8df;
    --vp-accent:#8b0f16;--vp-accent-dark:#64090e;--vp-accent-soft:#f4e6e2;
    --canvas:#e7e2d8;
    --font-headline:Georgia,"Times New Roman",serif;
    --font-ui:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-mono:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--canvas);color:var(--vp-text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;min-height:100vh}

  .control-bar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:14px 24px;background:rgba(247,244,239,0.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--vp-border)}
  .control-bar__brand{font-family:var(--font-headline);font-size:22px;letter-spacing:0.04em;color:var(--vp-text);font-weight:400;margin-right:auto}
  .control-bar__brand small{display:inline-block;margin-left:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--vp-accent);font-weight:500;vertical-align:3px}

  .seg{display:inline-flex;border:1px solid var(--vp-border);border-radius:999px;background:var(--vp-surface);padding:3px}
  .seg button{border:0;background:transparent;cursor:pointer;padding:7px 14px;border-radius:999px;font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--vp-text-muted);letter-spacing:0.02em}
  .seg button[aria-pressed="true"]{background:var(--vp-accent);color:#fff}
  .seg button:not([aria-pressed="true"]):hover{color:var(--vp-text)}
  .seg__label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--vp-text-soft);margin-right:8px}
  .control-group{display:inline-flex;align-items:center;gap:10px}

  .stage{padding:32px 24px 48px;display:flex;justify-content:center}
  .frame{background:#000;border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.18);transition:width 0.28s ease, height 0.28s ease;border:1px solid #222}
  .frame--desktop{width:1440px;max-width:calc(100vw - 48px);height:calc(100vh - 160px);min-height:720px;border-radius:14px;padding:0}
  .frame--mobile{width:430px;height:844px;border-radius:42px;padding:10px;background:#1a1816}
  .frame--mobile::before{content:"";display:block;width:120px;height:26px;background:#000;border-radius:0 0 18px 18px;margin:-10px auto 6px}
  .frame iframe{width:100%;height:100%;border:0;display:block;background:var(--vp-bg)}
  .frame--mobile iframe{border-radius:32px;height:calc(100% - 22px)}

  @media (max-width:760px){
    .control-bar{padding:12px 16px;gap:10px}
    .control-bar__brand{flex-basis:100%}
    .stage{padding:18px 12px 32px}
    .frame--desktop{height:calc(100vh - 200px);min-height:520px}
  }
</style>
</head>
<body>

<header class="control-bar">
  <div class="control-bar__brand">Verity Post <small>Redesign Preview</small></div>
  <div class="control-group">
    <span class="seg__label">Page</span>
    <div class="seg" role="radiogroup" aria-label="Page">
      <button id="btn-home" aria-pressed="true" type="button">Home</button>
      <button id="btn-discuss" aria-pressed="false" type="button">Discuss</button>
      <button id="btn-article" aria-pressed="false" type="button">Article</button>
      <button id="btn-search" aria-pressed="false" type="button">Search</button>
      <button id="btn-category" aria-pressed="false" type="button">Category</button>
      <button id="btn-profile" aria-pressed="false" type="button">Profile</button>
    </div>
  </div>
  <div class="control-group">
    <span class="seg__label">Viewport</span>
    <div class="seg" role="radiogroup" aria-label="Viewport">
      <button id="btn-desktop" aria-pressed="true" type="button">Desktop</button>
      <button id="btn-mobile" aria-pressed="false" type="button">Mobile</button>
    </div>
  </div>
</header>

<main class="stage">
  <div id="frame" class="frame frame--desktop">
    <iframe id="preview" title="Preview"></iframe>
  </div>
</main>

<script type="text/template" id="mock-home-desktop">
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verity Post — Home (mock)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --vp-bg:#f7f4ef;
    --vp-surface:#ffffff;
    --vp-surface-soft:#fbf7ef;
    --vp-text:#171717;
    --vp-text-muted:#66615a;
    --vp-text-soft:#8a8379;
    --vp-border:#ded8ce;
    --vp-border-soft:#eee8df;
    --vp-accent:#8b0f16;
    --vp-accent-dark:#64090e;
    --vp-accent-soft:#f4e6e2;
    --vp-warning:#a15c00;
    --vp-success:#2f6f4e;
    --vp-link:#1f3f68;

    --font-headline:Georgia,"Times New Roman",serif;
    --font-body:Georgia,"Times New Roman",serif;
    --font-ui:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-mono:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--vp-bg);color:var(--vp-text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  a:hover{color:var(--vp-accent)}
  ::selection{background:var(--vp-accent-soft);color:var(--vp-accent-dark)}

  /* ── site header ───────────────────────────────────────── */
  .site-header{
    position:sticky;top:0;z-index:50;
    height:64px;display:flex;align-items:center;
    border-bottom:1px solid var(--vp-border-soft);
    background:rgba(247,244,239,0.92);
    backdrop-filter:blur(12px);
  }
  .site-header__inner{
    max-width:1440px;width:100%;margin:0 auto;padding:0 32px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;
  }
  .site-nav{display:flex;gap:22px;font-family:var(--font-ui);font-size:13px;color:var(--vp-text-muted);font-weight:500}
  .site-nav a:hover{color:var(--vp-text)}
  .site-logo{
    font-family:var(--font-headline);font-size:28px;letter-spacing:0.04em;
    text-align:center;font-weight:400;
  }
  .site-utils{display:flex;justify-content:flex-end;gap:14px;font-family:var(--font-ui);font-size:13px;color:var(--vp-text-muted);align-items:center}
  .site-utils a:hover{color:var(--vp-text)}
  .util-search{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;border:1px solid var(--vp-border);border-radius:999px;
    background:var(--vp-surface);font-size:12px;color:var(--vp-text-soft);
  }
  .mobile-menu-button{display:none}

  /* mobile header */
  @media (max-width:840px){
    .site-header{height:58px}
    .site-header__inner{padding:0 18px;grid-template-columns:40px 1fr 40px;gap:10px}
    .site-nav{display:none}
    .mobile-menu-button{
      display:inline-flex;width:36px;height:36px;align-items:center;justify-content:center;
      border:1px solid var(--vp-border);border-radius:999px;background:var(--vp-surface);
      font-family:var(--font-ui);font-size:16px;color:var(--vp-text-muted);cursor:pointer;
    }
    .site-logo{font-size:22px;justify-self:center}
    .site-utils{justify-self:end;gap:0}
    .site-utils .util-search{display:none}
    .site-utils a:not(.util-search){
      font-size:0;width:36px;height:36px;
      border:1px solid var(--vp-border);border-radius:999px;background:var(--vp-surface);
      display:inline-flex;align-items:center;justify-content:center;
    }
    .site-utils a:not(.util-search)::after{
      content:"↗";font-size:14px;color:var(--vp-text-muted);
    }
  }

  /* ── story change line ─────────────────────────────────── */
  .story-preview__change,
  .lead__change{
    margin-top:10px;padding:2px 0 2px 10px;
    border-left:2px solid var(--vp-accent);
    font-family:var(--font-ui);font-size:13px;line-height:1.45;color:var(--vp-text-muted);
  }
  .lead__change{font-size:14px;margin:8px 0 14px}

  /* ── story state pills ─────────────────────────────────── */
  .story-state{
    margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;
    font-family:var(--font-mono);font-size:10px;color:var(--vp-text-soft);
  }
  .story-state span{
    border:1px solid var(--vp-border-soft);border-radius:999px;
    padding:4px 8px;background:var(--vp-surface);letter-spacing:0.02em;
  }
  .story-state span.gate{
    border-color:var(--vp-accent);color:var(--vp-accent);background:var(--vp-accent-soft);
  }

  /* ── shell ─────────────────────────────────────────────── */
  .home-shell{max-width:1440px;margin:0 auto;padding:0 32px 64px}

  /* ── main grid ─────────────────────────────────────────── */
  .home-grid{
    display:grid;
    grid-template-columns:minmax(0,1fr) 320px;
    gap:48px;align-items:start;
    padding-top:32px;
  }
  @media (max-width:840px){
    .home-grid{grid-template-columns:1fr;gap:32px}
  }

  /* section headers shared */
  .sect-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:32px 0 16px;
    border-top:1px solid var(--vp-border);padding-top:14px;
  }
  .sect-head:first-child{margin-top:0;border-top:0;padding-top:0}
  .sect-head__title{
    font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--vp-text-muted);font-weight:500;
  }
  .sect-head__more{
    font-family:var(--font-ui);font-size:11px;color:var(--vp-text-soft);
    letter-spacing:0.04em;text-transform:uppercase;
  }

  /* ── lead cluster ──────────────────────────────────────── */
  .lead-cluster{
    display:grid;grid-template-columns:minmax(0,1.2fr) 300px;gap:28px;
    padding:28px;
    background:linear-gradient(180deg,#fff 0%,#fbf7ef 100%);
    border:1px solid var(--vp-border);
    border-radius:28px;
    box-shadow:0 18px 48px rgba(20,16,12,0.06);
  }
  @media (max-width:840px){.lead-cluster{display:block;padding:22px}}

  .lead__kicker{
    font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--vp-accent);
  }
  .lead__headline{
    margin:10px 0 12px;
    font-family:var(--font-headline);
    font-size:clamp(38px,4vw,56px);line-height:0.96;letter-spacing:-0.045em;
    font-weight:400;
  }
  .lead__deck{
    font-family:var(--font-ui);font-size:17px;line-height:1.55;
    color:var(--vp-text-muted);max-width:60ch;
  }
  .lead__status{
    margin:14px 0 4px;display:flex;flex-wrap:wrap;gap:8px;
    font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;
    color:var(--vp-text-soft);align-items:center;
  }
  .lead__status .sep{opacity:0.5}
  .lead__status .status-tag{
    color:var(--vp-accent);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;
  }
  .lead__meta{
    margin-top:18px;display:flex;flex-wrap:wrap;gap:8px;
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 11px;
    border:1px solid var(--vp-border);border-radius:999px;
    background:var(--vp-surface);
    font-family:var(--font-ui);font-size:12px;color:var(--vp-text-muted);
  }
  .chip--accent{border-color:var(--vp-accent);color:var(--vp-accent);background:var(--vp-accent-soft)}
  .chip__dot{width:6px;height:6px;border-radius:50%;background:var(--vp-text-soft)}
  .chip--accent .chip__dot{background:var(--vp-accent)}

  /* lead timeline preview */
  .lead-timeline{
    border-left:1px solid var(--vp-border-soft);padding-left:20px;
  }
  @media (max-width:840px){.lead-timeline{border-left:0;padding-left:0;margin-top:24px;border-top:1px solid var(--vp-border-soft);padding-top:18px}}
  .lead-timeline__label{
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--vp-text-soft);margin-bottom:14px;
  }
  .tl-event{position:relative;padding:0 0 14px 18px;font-family:var(--font-ui);font-size:13px;line-height:1.45}
  .tl-event::before{
    content:"";position:absolute;left:0;top:5px;width:8px;height:8px;
    border-radius:50%;background:var(--vp-text-soft);
  }
  .tl-event::after{
    content:"";position:absolute;left:3.5px;top:13px;bottom:-2px;width:1px;background:var(--vp-border);
  }
  .tl-event:last-child::after{display:none}
  .tl-event--now::before{background:var(--vp-accent);box-shadow:0 0 0 3px var(--vp-accent-soft)}
  .tl-event--now{font-weight:600;color:var(--vp-accent-dark)}
  .tl-event__date{
    display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--vp-text-soft);margin-bottom:2px;
  }
  .tl-event--now .tl-event__date{color:var(--vp-accent)}

  /* ── story preview (the workhorse unit) ────────────────── */
  .story-preview{
    padding:16px 0;border-bottom:1px solid var(--vp-border-soft);
  }
  .story-preview:last-child{border-bottom:0}
  .story-preview__kicker{
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--vp-text-soft);
  }
  .story-preview__kicker .sep{color:var(--vp-text-soft);margin:0 8px;opacity:0.6}
  .story-preview__kicker .developing{color:var(--vp-accent);font-weight:500}
  .story-preview__title{
    margin:6px 0 6px;
    font-family:var(--font-headline);font-size:24px;line-height:1.05;letter-spacing:-0.025em;
    font-weight:400;
  }
  .story-preview__summary{
    font-family:var(--font-ui);font-size:14px;line-height:1.5;color:var(--vp-text-muted);
    max-width:62ch;
  }
  .story-preview__meta{
    margin-top:10px;font-family:var(--font-mono);font-size:11px;color:var(--vp-text-soft);
    letter-spacing:0.02em;
  }
  .story-preview__meta .sep{margin:0 8px}

  /* size variants */
  .story-preview--major .story-preview__title{font-size:26px}
  .story-preview--brief{padding:10px 0;border-bottom:1px solid var(--vp-border-soft)}
  .story-preview--brief .story-preview__title{font-size:17px;line-height:1.2;margin:4px 0 0}
  .story-preview--brief .story-preview__summary{display:none}
  .story-preview--brief .story-preview__meta{margin-top:4px;font-size:10px}

  /* ── trust rail ────────────────────────────────────────── */
  .rail-card{
    background:var(--vp-surface);border:1px solid var(--vp-border-soft);
    border-radius:18px;padding:18px;margin-bottom:18px;
    box-shadow:0 6px 18px rgba(20,16,12,0.03);
  }
  .rail-card--soft{background:var(--vp-surface-soft);border-color:var(--vp-border)}
  .rail-card__label{
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--vp-accent);margin-bottom:12px;
  }
  .rail-card__title{
    font-family:var(--font-headline);font-size:20px;line-height:1.1;
    letter-spacing:-0.02em;margin:0 0 8px;
  }
  .rail-card__body{font-family:var(--font-ui);font-size:13px;line-height:1.5;color:var(--vp-text-muted)}
  .rail-card__list{margin:6px 0 0;padding:0;list-style:none}
  .rail-card__list li{
    padding:10px 0;border-top:1px solid var(--vp-border-soft);
    font-family:var(--font-ui);font-size:13px;line-height:1.4;
  }
  .rail-card__list li:first-child{border-top:0;padding-top:2px}
  .rail-card__list .ts{
    display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--vp-text-soft);margin-bottom:3px;
  }

  /* quiz-gated module in rail */
  .quiz-rail{
    background:var(--vp-surface-soft);
    border:1px solid #e4cdb8;
    border-radius:20px;padding:18px;margin-bottom:18px;
  }
  .quiz-rail__pretitle{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--vp-accent);margin-bottom:8px}
  .quiz-rail__title{font-family:var(--font-headline);font-size:20px;line-height:1.1;letter-spacing:-0.02em;margin:0 0 6px}
  .quiz-rail__sub{font-family:var(--font-ui);font-size:13px;line-height:1.5;color:var(--vp-text-muted);margin-bottom:14px}
  .quiz-rail__stat{font-family:var(--font-mono);font-size:11px;color:var(--vp-text-soft);margin-bottom:14px}
  .quiz-rail__stat strong{color:var(--vp-accent);font-weight:500}
  .quiz-cta{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--vp-accent);color:#fff;border:0;border-radius:10px;
    padding:10px 18px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;
  }
  .quiz-cta:hover{background:var(--vp-accent-dark);color:#fff}

  /* small section blocks within rail */
  .rail-meta-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-top:1px solid var(--vp-border-soft);
    font-family:var(--font-ui);font-size:13px;
  }
  .rail-meta-row:first-of-type{border-top:0}
  .rail-meta-row .ttl{color:var(--vp-text)}
  .rail-meta-row .val{font-family:var(--font-mono);font-size:11px;color:var(--vp-text-soft)}

  /* ── density wall (major stories) ──────────────────────── */
  .density-wall .story-preview__title{font-size:22px}
  .ctx-count{
    text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--vp-text-soft);
    letter-spacing:0.04em;
  }
  .ctx-count strong{display:block;font-size:22px;color:var(--vp-text);font-weight:400;font-family:var(--font-headline);margin-bottom:2px}

  /* ── footer ────────────────────────────────────────────── */
  .site-foot{
    margin-top:64px;border-top:1px solid var(--vp-border);
    padding:32px 0 24px;font-family:var(--font-ui);color:var(--vp-text-soft);
  }
  .site-foot__tagline{
    margin:0 0 28px;max-width:62ch;
    font-family:var(--font-headline);font-size:18px;line-height:1.4;
    letter-spacing:-0.01em;color:var(--vp-text-muted);font-style:italic;
  }
  .site-foot__groups{
    display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:32px;
    padding-bottom:24px;border-bottom:1px solid var(--vp-border-soft);
  }
  @media (max-width:840px){.site-foot__groups{grid-template-columns:repeat(2,1fr);gap:24px}}
  .foot-group{display:flex;flex-direction:column;gap:8px}
  .foot-group__label{
    font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--vp-text);margin-bottom:6px;font-weight:500;
  }
  .foot-group a{font-size:13px;color:var(--vp-text-muted)}
  .foot-group a:hover{color:var(--vp-text)}
  .site-foot__base{
    margin-top:20px;font-size:12px;
    font-family:var(--font-mono);letter-spacing:0.04em;color:var(--vp-text-soft);
  }

  /* ── sponsor unit (restrained, labeled) ────────────────── */
  .sponsor{
    margin-top:18px;padding:14px 16px;
    border:1px solid var(--vp-border-soft);border-radius:14px;
    background:var(--vp-surface);
  }
  .sponsor__label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--vp-text-soft);margin-bottom:6px}
  .sponsor__body{font-family:var(--font-ui);font-size:13px;color:var(--vp-text-muted);line-height:1.4}
  .sponsor__policy{
    margin-top:10px;padding-top:10px;border-top:1px solid var(--vp-border-soft);
    font-family:var(--font-ui);font-size:11px;color:var(--vp-text-soft);line-height:1.45;
  }
  .sponsor__policy a{color:var(--vp-text-muted);text-decoration:underline;text-decoration-color:var(--vp-border)}
  .sponsor__policy a:hover{color:var(--vp-accent)}

  /* ── accessibility ─────────────────────────────────────── */
  a:focus-visible,
  button:focus-visible{

<style>
  :root{

  .m-section-nav a.cur{color:var(--vp-text);border-bottom:1px solid var(--vp-accent);font-weight:500}

  .m-shell{padding:24px 16px 56px}

      <!-- headline + deck -->
      <h1 class="article-headline">Senate panel narrows aid package after a third day of closed-door talks</h1>
      <p class="article-deck">Leaders on both sides agreed to drop two of the original eight provisions and trim funding by roughly a third, putting the bill on track for a procedural vote later this week.</p>

      <!-- byline -->
      <div class="byline-row">
        <div class="byline">By <strong>Maria Chen</strong> &nbsp; &amp; &nbsp; <strong>David Park</strong></div>
        <div class="byline-meta">
          <span>Published May 14, 2026 · 9:42 AM ET</span>
          <span class="sep">·</span>

          <span class="sep">·</span>
          <span>6 min read</span>
        </div>
      </div>

      <!-- article body -->
      <div class="article-body">
        <p>Negotiators on the Senate Appropriations subcommittee emerged from a third day of closed-door talks with an agreement that drops two provisions from the original eight-part funding package and trims overall spending by roughly one third, according to four people familiar with the deal.</p>

        <p>The two removed provisions covered grants to state-level workforce programs and a research line at the Department of Energy. Both had been added during House debate in April but had drawn objections from two senators whose votes are needed to clear the procedural threshold.</p>

        <p>The deal, if it holds through committee markup on Thursday, would set up a floor vote as early as next Tuesday. Leadership in both chambers has signaled that the narrower package is acceptable, though several House Democrats said in statements after the announcement that they want to see the final text before committing.</p>

        <p>The original request, released by the White House in March, totaled $42 billion and covered eight distinct funding lines. The version that passed the House in April retained all eight lines but added bipartisan amendments tightening eligibility for two of them. Today's narrower deal preserves the six remaining lines and the House's eligibility language.</p>

        <h2>What changes in the new draft</h2>

        <p>The clearest change is the funding total. Where the House version came in at roughly $39 billion after amendments, the Senate draft brings the package to approximately $26 billion. Most of the reduction comes from dropping the two removed provisions; the remaining six lines are largely unchanged from House-passed levels.</p>

        <p>A second change is the inclusion of a one-year sunset clause on two of the remaining provisions. That language was not in the House version and would require Congress to reauthorize those lines before next year's appropriations cycle. Two senators involved in negotiations cited the sunset as the concession that allowed them to support the broader package.</p>

        <p>The third notable change is procedural: the new draft eliminates a budget reconciliation pathway that the House had relied on. The Senate version moves the bill through regular order, which raises the threshold for passage but, negotiators argued, gives the package more durability if challenged.</p>

        <h2>What to watch this week</h2>

        <p>Three things will determine whether the deal holds. The first is Thursday's markup, where amendments can still be offered. The second is the Congressional Budget Office score, expected Friday, which will set the official spending baseline used in floor debate. The third is whether the two senators who held out during negotiations stay on board once the final text circulates.</p>

        <p>If all three move in the deal's direction, a floor vote next week is likely. If any one of them produces an unexpected result, the package could return to negotiation — a path that staff on both sides described as undesirable but not unprecedented for legislation at this stage.</p>

  <h1 class="article-headline">Senate panel narrows aid package after a third day of closed-door talks</h1>
  <p class="article-deck">Leaders agreed to drop two of the original eight provisions and trim funding by roughly a third, putting the bill on track for a procedural vote later this week.</p>

  <div class="byline">By <strong>Maria Chen</strong> &amp; <strong>David Park</strong></div>
  <div class="byline-meta">
    <span>May 14, 2026 · 9:42 AM ET</span><span class="sep">·</span>
    <span>Updated 18m ago</span><span class="sep">·</span>
    <span>6 min read</span>
  </div>


  <div class="article-body">
    <p>Negotiators on the Senate Appropriations subcommittee emerged from a third day of closed-door talks with an agreement that drops two provisions from the original eight-part funding package and trims overall spending by roughly one third, according to four people familiar with the deal.</p>
    <p>The two removed provisions covered grants to state-level workforce programs and a research line at the Department of Energy. Both had been added during House debate in April but had drawn objections from two senators whose votes are needed to clear the procedural threshold.</p>
    <p>The deal, if it holds through committee markup on Thursday, would set up a floor vote as early as next Tuesday. Leadership in both chambers has signaled the narrower package is acceptable.</p>
    <h2>What changes in the new draft</h2>
    <p>The clearest change is the funding total. Where the House version came in at roughly $39 billion after amendments, the Senate draft brings the package to approximately $26 billion.</p>
    <p>A second change is the inclusion of a one-year sunset clause on two of the remaining provisions. That language was not in the House version and would require Congress to reauthorize those lines before next year's appropriations cycle.</p>
    <h2>What to watch this week</h2>
    <p>Three things will determine whether the deal holds. The first is Thursday's markup, where amendments can still be offered. The second is the CBO score, expected Friday. The third is whether the two senators who held out stay on board.</p>
  </div>

<script>
(function(){
  var state = { page: 'home', viewport: 'desktop' };
  var pageBtns = {
    home:     document.getElementById('btn-home'),
    discuss:  document.getElementById('btn-discuss'),
    article:  document.getElementById('btn-article'),
    search:   document.getElementById('btn-search'),
    category: document.getElementById('btn-category'),
    profile:  document.getElementById('btn-profile')
  };
  var btnDesktop = document.getElementById('btn-desktop');
  var btnMobile  = document.getElementById('btn-mobile');
  var frame      = document.getElementById('frame');
  var preview    = document.getElementById('preview');

  function press(group, active){
    group.forEach(function(b){ b.setAttribute('aria-pressed', b === active ? 'true' : 'false'); });
  }
  function update(){
    var key = state.page + '-' + state.viewport;
    var tpl = document.getElementById('mock-' + key);
    if (tpl) preview.srcdoc = tpl.textContent;
    frame.classList.toggle('frame--mobile',  state.viewport === 'mobile');
    frame.classList.toggle('frame--desktop', state.viewport === 'desktop');
  }
  Object.keys(pageBtns).forEach(function(page){
    pageBtns[page].addEventListener('click', function(){
      state.page = page;
      press(Object.values(pageBtns), pageBtns[page]);
      update();
    });
  });
  btnDesktop.addEventListener('click', function(){
    state.viewport = 'desktop'; press([btnDesktop, btnMobile], btnDesktop); update();
  });
  btnMobile.addEventListener('click', function(){
    state.viewport = 'mobile';  press([btnDesktop, btnMobile], btnMobile);  update();
  });

  update();
})();
</script>
