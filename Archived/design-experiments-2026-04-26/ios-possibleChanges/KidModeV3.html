<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kid Mode V3 — VerityPost</title>
<style>
*{margin:0;box-sizing:border-box}
:root{
  --teal:#2DD4BF;--teal-dark:#0D9488;--teal-light:#CCFBF1;--teal-glow:rgba(45,212,191,.35);
  --coral:#FB7185;--coral-dark:#BE123C;--purple:#A78BFA;--gold:#FBBF24;--sky:#38BDF8;--mint:#34D399;
  --bg:#FAFAFA;--card:#FFF;--text:#1A1A1A;--dim:#9CA3AF;--border:#E5E7EB;
}
body{background:#0A0A0F;font-family:'SF Pro Rounded','SF Pro Display',-apple-system,system-ui,sans-serif;overflow-x:hidden;color:var(--text)}

/* Phone shell */
.phone{width:390px;height:844px;background:var(--bg);border-radius:52px;overflow:hidden;position:relative;
  box-shadow:0 0 0 4px #1a1a1a,0 0 0 6px #333,0 40px 100px rgba(0,0,0,.6);margin:0 auto}
.phone-screen{height:100%;overflow:hidden;position:relative}
.dynamic-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:36px;
  background:#000;border-radius:20px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* Utilities */
.spring{transition:transform .6s cubic-bezier(.22,1.5,.36,1)}
.soft{transition:all .5s cubic-bezier(.16,1,.3,1)}
.bounce{animation:bounce .6s cubic-bezier(.22,1.5,.36,1)}

/* Canvas overlay */
canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}

/* Shared animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes typeChar{from{width:0}to{width:100%}}
@keyframes cursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes countUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ringExpand{from{transform:scale(.5);opacity:1}to{transform:scale(3);opacity:0}}
@keyframes popStar{0%{transform:scale(0) rotate(0)}60%{transform:scale(1.3) rotate(180deg)}100%{transform:scale(1) rotate(360deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px var(--teal-glow)}50%{box-shadow:0 0 40px var(--teal-glow),0 0 80px rgba(45,212,191,.15)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(600px) rotate(720deg);opacity:0}}
@keyframes flameWave{0%,100%{d:path("M50 10 C50 10 20 45 20 65 C20 82 33 95 50 95 C67 95 80 82 80 65 C80 45 50 10 50 10Z")}
50%{d:path("M50 5 C50 5 15 45 18 68 C21 85 35 98 50 98 C65 98 79 85 82 68 C85 45 50 5 50 5Z")}}
@keyframes innerFlame{0%,100%{d:path("M50 50 C50 50 38 65 38 75 C38 82 43 88 50 88 C57 88 62 82 62 75 C62 65 50 50 50 50Z")}
50%{d:path("M50 45 C50 45 35 63 35 75 C35 85 42 92 50 92 C58 92 65 85 65 75 C65 63 50 45 50 45Z")}}
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px;background:linear-gradient(180deg,#0A0A0F,#111128)">
  <h1 style="font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;margin:0 0 4px;text-align:center">Kid Mode Delight</h1>
  <p style="font-size:15px;color:rgba(255,255,255,.4);margin:0 0 28px;text-align:center">Current vs. Proposed — tap to play</p>

  <div id="nav" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:28px"></div>

  <!-- Side by side -->
  <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;justify-content:center">
    <div style="text-align:center">
      <p style="font-size:13px;font-weight:700;color:rgba(255,255,255,.3);margin:0 0 12px;text-transform:uppercase;letter-spacing:1px">Current</p>
      <div class="phone" id="phone-old"><div class="phone-screen" id="screen-old"></div><div class="dynamic-island"></div></div>
    </div>
    <div style="text-align:center">
      <p style="font-size:13px;font-weight:700;color:var(--teal);margin:0 0 12px;text-transform:uppercase;letter-spacing:1px">Proposed</p>
      <div class="phone" id="phone-new" style="box-shadow:0 0 0 4px #1a1a1a,0 0 0 6px var(--teal-dark),0 0 60px var(--teal-glow),0 40px 100px rgba(0,0,0,.6)">
        <div class="phone-screen" id="screen-new"></div>
        <div class="dynamic-island"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Engine ──────────────────────────────────────────────────────────────
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='className')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(typeof c==='string')e.appendChild(document.createTextNode(c));else if(c)e.appendChild(c);});
  return e;
};

// Particle system
class ParticleSystem{
  constructor(canvas){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.particles=[];this.running=false;
    canvas.width=390;canvas.height=844;}
  emit(ps){this.particles.push(...ps);if(!this.running){this.running=true;this.loop();}}
  loop(){
    this.ctx.clearRect(0,0,390,844);
    this.particles=this.particles.filter(p=>{
      p.vy+=p.g;p.vx*=p.d;p.vy*=p.d;p.x+=p.vx;p.y+=p.vy;p.life--;p.rot+=p.rs;
      const a=Math.max(0,p.life/p.ml);const s=p.sz*(0.4+0.6*a);
      this.ctx.save();this.ctx.globalAlpha=a;this.ctx.translate(p.x,p.y);this.ctx.rotate(p.rot);
      this.ctx.fillStyle=p.c;
      if(p.sh==='c'){this.ctx.beginPath();this.ctx.arc(0,0,s,0,Math.PI*2);this.ctx.fill();}
      else if(p.sh==='s'){this.drawStar(0,0,5,s,s*.4);}
      else if(p.sh==='b'){this.ctx.fillRect(-s*.25,-s,s*.5,s*2);}
      else if(p.sh==='d'){this.ctx.beginPath();this.ctx.moveTo(0,-s);this.ctx.lineTo(s*.7,0);this.ctx.lineTo(0,s);this.ctx.lineTo(-s*.7,0);this.ctx.closePath();this.ctx.fill();}
      else if(p.sh==='r'){this.ctx.fillRect(-s*.6,-s*.3,s*1.2,s*.6);}
      this.ctx.restore();
      return p.life>0;
    });
    if(this.particles.length>0)requestAnimationFrame(()=>this.loop());
    else{this.running=false;this.ctx.clearRect(0,0,390,844);}
  }
  drawStar(cx,cy,sp,or,ir){
    let rot=-Math.PI/2,step=Math.PI/sp;
    this.ctx.beginPath();this.ctx.moveTo(cx+Math.cos(rot)*or,cy+Math.sin(rot)*or);
    for(let i=0;i<sp;i++){rot+=step;this.ctx.lineTo(cx+Math.cos(rot)*ir,cy+Math.sin(rot)*ir);rot+=step;this.ctx.lineTo(cx+Math.cos(rot)*or,cy+Math.sin(rot)*or);}
    this.ctx.closePath();this.ctx.fill();
  }
  makeP(x,y,vx,vy,color,size,life,gravity=.08,drag=.97,shape='c'){
    return{x,y,vx,vy,c:color,sz:size,life,ml:life,g:gravity,d:drag,sh:shape,rot:Math.random()*6.28,rs:(Math.random()-.5)*.3};
  }
}

// Colors
const C={teal:'#2DD4BF',tealDark:'#0D9488',tealLight:'#CCFBF1',coral:'#FB7185',purple:'#A78BFA',gold:'#FBBF24',sky:'#38BDF8',mint:'#34D399'};
const shapes=['c','s','b','d','r'];
const colors=[C.teal,C.coral,C.purple,C.gold,C.sky,C.mint,'#FFF'];

// ── Demos ───────────────────────────────────────────────────────────────
const demos=[
  {id:'greeting',label:'Morning Ritual'},
  {id:'streak',label:'Streak +1'},
  {id:'quiz',label:'Quiz Pass'},
  {id:'badge',label:'Badge Unlock'},
];

let activeDemo=null;
const nav=$('#nav');
demos.forEach(d=>{
  const btn=el('button',{style:{
    background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.6)',border:'1.5px solid rgba(255,255,255,.1)',
    borderRadius:'100px',padding:'10px 22px',cursor:'pointer',fontWeight:'700',fontSize:'13px',
    fontFamily:'inherit',transition:'all .2s ease',backdropFilter:'blur(8px)',
  },onClick:()=>runDemo(d.id)},[d.label]);
  nav.appendChild(btn);
});

function runDemo(id){
  activeDemo=id;
  // Highlight nav
  nav.querySelectorAll('button').forEach((b,i)=>{
    const active=demos[i].id===id;
    b.style.background=active?C.teal:'rgba(255,255,255,.08)';
    b.style.color=active?'#000':'rgba(255,255,255,.6)';
    b.style.borderColor=active?C.teal:'rgba(255,255,255,.1)';
  });
  // Clear
  $('#screen-old').innerHTML='';
  $('#screen-new').innerHTML='';
  // Run
  if(id==='greeting'){greetingOld();greetingNew();}
  if(id==='streak'){streakOld();streakNew();}
  if(id==='quiz'){quizOld();quizNew();}
  if(id==='badge'){badgeOld();badgeNew();}
}

// ── GREETING: OLD ──────────────────────────────────────────────────────
function greetingOld(){
  const screen=$('#screen-old');
  screen.innerHTML=`
    <div style="background:linear-gradient(135deg,${C.teal},${C.tealDark});padding:70px 24px 24px;border-radius:0 0 16px 16px">
      <p style="font-size:14px;font-weight:500;color:rgba(255,255,255,.6);margin:0 0 4px">Good morning</p>
      <p style="font-size:24px;font-weight:700;color:#FFF;margin:0">Lila</p>
    </div>
    <div style="padding:20px">
      <div style="height:50px;background:#F3F4F6;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;padding:0 14px">
        <span style="font-size:14px;color:#9CA3AF">5 day streak</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${['Science','World','Sports','Tech'].map(n=>`
          <div style="background:#FFF;border:1px solid #E5E7EB;border-radius:10px;padding:14px">
            <div style="width:28px;height:28px;border-radius:8px;background:#F3F4F6;margin-bottom:8px"></div>
            <p style="font-size:13px;font-weight:600;color:#1A1A1A;margin:0">${n}</p>
          </div>
        `).join('')}
      </div>
    </div>
    <p style="text-align:center;font-size:11px;color:#EF4444;font-weight:600;margin-top:20px;padding:0 20px">Static render. No motion, no staging, no personality. The information is correct but the feeling is absent.</p>
  `;
}

// ── GREETING: NEW ──────────────────────────────────────────────────────
function greetingNew(){
  const screen=$('#screen-new');
  const canvas=el('canvas',{width:390,height:844,style:{position:'absolute',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none',zIndex:'50'}});
  const ps=new ParticleSystem(canvas);

  // Build DOM
  const band=el('div',{style:{
    background:`linear-gradient(135deg,${C.teal} 0%,${C.tealDark} 40%,${C.purple} 100%)`,
    padding:'70px 24px 28px',borderRadius:'0 0 28px 28px',position:'relative',overflow:'hidden',
    transform:'translateY(-120px)',opacity:'0',
  }});

  // Shimmer layer
  const shimmerEl=el('div',{style:{
    position:'absolute',top:'0',left:'-100%',width:'60%',height:'100%',
    background:'linear-gradient(110deg,transparent,rgba(255,255,255,.15),transparent)',
    transform:'skewX(-20deg)',
  }});
  band.appendChild(shimmerEl);

  // Floating orbs background
  for(let i=0;i<6;i++){
    const orb=el('div',{style:{
      position:'absolute',width:(8+i*4)+'px',height:(8+i*4)+'px',borderRadius:'50%',
      background:`rgba(255,255,255,${0.04+i*0.02})`,
      right:(15+i*22)+'px',bottom:(10+i*8)+'px',
      animation:`float ${2.5+i*0.4}s ease-in-out ${i*0.2}s infinite`,
    }});
    band.appendChild(orb);
  }

  // Time orb
  const h=new Date().getHours();
  const timeWord=h<12?'morning':h<17?'afternoon':'evening';
  const timeSVG=h<12
    ?`<circle cx="14" cy="14" r="5" fill="#FFF"/><g stroke="#FFF" stroke-width="1.5" stroke-linecap="round">${[0,45,90,135,180,225,270,315].map(a=>`<line x1="14" y1="4" x2="14" y2="2" transform="rotate(${a} 14 14)"/>`).join('')}</g>`
    :h<17
    ?`<circle cx="11" cy="13" r="5" fill="#FFF"/><circle cx="16" cy="12" r="4" fill="#FFF"/><circle cx="13" cy="15" r="3.5" fill="#FFF"/>`
    :`<path d="M23 14.79A9 9 0 1113.21 5 7 7 0 0023 14.79z" fill="#FFF" transform="scale(.7) translate(5,5)"/>`;

  const orbEl=el('div',{style:{
    width:'56px',height:'56px',borderRadius:'50%',
    background:'rgba(255,255,255,.12)',backdropFilter:'blur(12px)',
    display:'flex',alignItems:'center',justifyContent:'center',
    transform:'scale(0) rotate(-120deg)',transition:'transform .7s cubic-bezier(.22,1.5,.36,1)',
    boxShadow:'0 4px 20px rgba(0,0,0,.15)',border:'1px solid rgba(255,255,255,.1)',
    flexShrink:'0',
  }});
  orbEl.innerHTML=`<svg width="28" height="28" viewBox="0 0 28 28">${timeSVG}</svg>`;

  const greetLine=el('p',{style:{fontSize:'14px',fontWeight:'600',color:'rgba(255,255,255,.55)',margin:'0 0 2px',opacity:'0',transform:'translateY(8px)',transition:'all .4s cubic-bezier(.16,1,.3,1)'}},['Good '+timeWord]);

  const nameEl=el('div',{style:{position:'relative',height:'44px',overflow:'hidden'}});
  const nameText=el('p',{style:{fontSize:'38px',fontWeight:'900',color:'#FFF',margin:'0',letterSpacing:'-1px',lineHeight:'44px'}});
  nameEl.appendChild(nameText);

  const underline=el('div',{style:{height:'3px',borderRadius:'2px',background:'rgba(255,255,255,.35)',width:'0',transition:'width .5s ease-out',marginTop:'6px',position:'relative'}});
  const underGlow=el('div',{style:{position:'absolute',top:'-3px',left:'0',height:'9px',width:'100%',borderRadius:'5px',background:'rgba(255,255,255,.1)',filter:'blur(6px)'}});
  underline.appendChild(underGlow);

  const row=el('div',{style:{display:'flex',alignItems:'center',gap:'16px',position:'relative'}},[orbEl,el('div',{},[greetLine,nameEl,underline])]);
  band.appendChild(row);

  // Streak card
  const streak=el('div',{style:{
    margin:'20px 20px 0',background:'#FFF',borderRadius:'22px',padding:'18px 20px',
    boxShadow:'0 4px 24px rgba(0,0,0,.06)',border:'1px solid #E5E7EB',
    display:'flex',alignItems:'center',gap:'16px',
    opacity:'0',transform:'translateY(24px)',transition:'all .6s cubic-bezier(.16,1,.3,1)',
  }});
  const flameBox=el('div',{style:{
    width:'52px',height:'52px',borderRadius:'16px',flexShrink:'0',
    background:`linear-gradient(135deg,${C.coral},${C.gold})`,
    display:'flex',alignItems:'center',justifyContent:'center',
    animation:'breathe 3s ease-in-out infinite',
    boxShadow:'0 4px 16px rgba(251,113,133,.25)',
  }});
  flameBox.innerHTML=`<svg width="28" height="28" viewBox="0 0 100 100"><path d="M50 10 C50 10 20 45 20 65 C20 82 33 95 50 95 C67 95 80 82 80 65 C80 45 50 10 50 10Z" fill="#FFF"><animate attributeName="d" values="M50 10 C50 10 20 45 20 65 C20 82 33 95 50 95 C67 95 80 82 80 65 C80 45 50 10 50 10Z;M50 5 C50 5 15 42 18 68 C21 85 35 98 50 98 C65 98 79 85 82 68 C85 42 50 5 50 5Z;M50 10 C50 10 20 45 20 65 C20 82 33 95 50 95 C67 95 80 82 80 65 C80 45 50 10 50 10Z" dur="2s" repeatCount="indefinite"/></svg>`;
  streak.appendChild(flameBox);
  const streakInfo=el('div');
  streakInfo.innerHTML=`<p style="font-size:26px;font-weight:900;color:#1A1A1A;margin:0;line-height:1">6 day streak</p><p style="font-size:13px;font-weight:500;color:#9CA3AF;margin:3px 0 0">Read one more to keep it alive</p>`;
  streak.appendChild(streakInfo);

  // Category cards
  const cats=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',margin:'14px 20px 0',opacity:'0',transform:'translateY(24px)',transition:'all .6s cubic-bezier(.16,1,.3,1)'}});
  [{n:'Science',c:C.purple,p:4},{n:'World',c:C.teal,p:2},{n:'Sports',c:C.coral,p:0},{n:'Tech',c:C.sky,p:3}].forEach((cat,i)=>{
    const card=el('div',{style:{
      background:'#FFF',borderRadius:'18px',padding:'16px',border:'1px solid #E5E7EB',
      transform:'scale(.85)',opacity:'0',
      transition:`all .5s cubic-bezier(.22,1.5,.36,1) ${0.05*i}s`,
    }});
    card.innerHTML=`
      <div style="width:40px;height:40px;border-radius:12px;background:${cat.c}15;display:flex;align-items:center;justify-content:center;margin-bottom:10px;border:1.5px solid ${cat.c}25">
        <div style="width:18px;height:18px;border-radius:6px;background:${cat.c}"></div>
      </div>
      <p style="font-size:14px;font-weight:800;color:#1A1A1A;margin:0 0 8px">${cat.n}</p>
      <div style="display:flex;gap:4px">${[0,1,2,3,4].map(j=>`<div style="flex:1;height:4px;border-radius:2px;background:${j<cat.p?cat.c:'#E5E7EB'};transition:background .3s ease ${j*.1}s"></div>`).join('')}</div>
    `;
    cats.appendChild(card);
  });

  screen.appendChild(band);
  screen.appendChild(streak);
  screen.appendChild(cats);
  screen.appendChild(canvas);

  // ── CHOREOGRAPHY ──
  const name='Lila';
  let charI=0;

  // Phase 1: Band drops (300ms)
  setTimeout(()=>{band.style.transition='transform .7s cubic-bezier(.22,1.5,.36,1), opacity .4s ease';band.style.transform='translateY(0)';band.style.opacity='1';},200);
  // Phase 2: Shimmer sweeps (600ms)
  setTimeout(()=>{shimmerEl.style.transition='left .8s ease';shimmerEl.style.left='200%';},500);
  // Phase 3: Orb spins in (700ms)
  setTimeout(()=>{orbEl.style.transform='scale(1) rotate(0deg)';},600);
  // Phase 4: Greeting fades (850ms)
  setTimeout(()=>{greetLine.style.opacity='1';greetLine.style.transform='translateY(0)';},750);
  // Phase 5: Name types (1000ms)
  const typeNext=()=>{
    if(charI<name.length){
      charI++;nameText.textContent=name.slice(0,charI);
      // Sparkle per character
      ps.emit([ps.makeP(140+charI*22,95,(Math.random()-.5)*2,-Math.random()*3-1,colors[Math.floor(Math.random()*colors.length)],Math.random()*3+1.5,30+Math.random()*20,.06,.96,shapes[Math.floor(Math.random()*shapes.length)])]);
      setTimeout(typeNext,90);
    }else{
      // Phase 6: Underline trims + big sparkle burst
      underline.style.width='100%';
      setTimeout(()=>{
        ps.emit(Array.from({length:25},()=>ps.makeP(
          120+Math.random()*60,105,(Math.random()-.5)*5,-(Math.random()*4+1),
          colors[Math.floor(Math.random()*colors.length)],
          Math.random()*4+2,40+Math.random()*25,.07,.96,
          shapes[Math.floor(Math.random()*shapes.length)]
        )));
      },200);
    }
  };
  setTimeout(typeNext,900);
  // Phase 7: Content cards stagger in
  setTimeout(()=>{streak.style.opacity='1';streak.style.transform='translateY(0)';},1600);
  setTimeout(()=>{cats.style.opacity='1';cats.style.transform='translateY(0)';cats.querySelectorAll(':scope > div').forEach(c=>{c.style.transform='scale(1)';c.style.opacity='1';});},1900);
}

// ── STREAK: OLD ────────────────────────────────────────────────────────
function streakOld(){
  const screen=$('#screen-old');
  screen.innerHTML=`
    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center">
      <div style="font-size:48px;margin-bottom:8px">🔥</div>
      <p style="font-size:48px;font-weight:700;color:#1A1A1A;margin:0">7</p>
      <p style="font-size:15px;color:#9CA3AF;margin:4px 0 0">day streak</p>
      <p style="text-align:center;font-size:11px;color:#EF4444;font-weight:600;margin-top:40px">Static number swap. No transition, no celebration, no milestone recognition. Just a label that changed.</p>
    </div>
  `;
}

// ── STREAK: NEW ────────────────────────────────────────────────────────
function streakNew(){
  const screen=$('#screen-new');
  const canvas=el('canvas',{width:390,height:844,style:{position:'absolute',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none',zIndex:'50'}});
  const ps=new ParticleSystem(canvas);

  const wrap=el('div',{style:{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}});

  // Radial glow bg
  const glow=el('div',{style:{position:'absolute',width:'350px',height:'350px',borderRadius:'50%',background:'radial-gradient(circle,rgba(45,212,191,.2),transparent 70%)',opacity:'0',transition:'opacity .8s ease',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}});
  wrap.appendChild(glow);

  // Animated flame SVG
  const flameWrap=el('div',{style:{width:'120px',height:'120px',position:'relative',transform:'scale(.4)',opacity:'0',transition:'all .7s cubic-bezier(.22,1.5,.36,1)',zIndex:'2'}});
  flameWrap.innerHTML=`
    <svg width="120" height="120" viewBox="0 0 100 100" style="filter:drop-shadow(0 8px 24px rgba(45,212,191,.4))">
      <defs>
        <linearGradient id="fg2" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stop-color="${C.tealDark}"/>
          <stop offset="35%" stop-color="${C.teal}"/>

  // Milestone card (hidden initially)
  const milestone=el('div',{style:{
    position:'absolute',bottom:'80px',left:'20px',right:'20px',zIndex:'10',

    boxShadow:'0 16px 50px rgba(0,0,0,.12)',border:'1px solid #E5E7EB',

  setTimeout(()=>{numInner.style.transform='translateY(0)';},550);
  // Phase 3: Background glow
  setTimeout(()=>{glow.style.opacity='1';},600);
  // Phase 4: Expanding rings
  setTimeout(()=>{

        ringContainer.appendChild(ring);
        setTimeout(()=>ring.remove(),800);
      },i*150);
    }
  },700);
  // Phase 5: MASSIVE particle burst
  setTimeout(()=>{
    const cx=195,cy=380;
    ps.emit(Array.from({length:70},(_,i)=>{
      const angle=(i/70)*Math.PI*2+Math.random()*.2;
      const speed=3+Math.random()*7;
      return ps.makeP(cx,cy,Math.cos(angle)*speed,Math.sin(angle)*speed-2,
        colors[Math.floor(Math.random()*colors.length)],
        Math.random()*6+2,50+Math.random()*40,.1,.96,
        shapes[Math.floor(Math.random()*shapes.length)]
      );
    }));
  },850);
  // Phase 6: Milestone slides up
  setTimeout(()=>{milestone.style.transform='translateY(0) scale(1)';milestone.style.opacity='1';},1800);
  // Phase 7: Gentle ongoing sparkles from flame

    ps.emit([ps.makeP(195+Math.random()*30-15,355,(Math.random()-.5)*1.5,-Math.random()*2-1,
      [C.teal,C.gold,'#FFF'][Math.floor(Math.random()*3)],Math.random()*2.5+1,25+Math.random()*15,.04,.97,'c')]);
  },200);
}

// ── QUIZ: NEW ──────────────────────────────────────────────────────────
function quizNew(){
  const screen=$('#screen-new');
  const canvas=el('canvas',{width:390,height:844,style:{position:'absolute',top:'0',left:'0',width:'100%',height:'100%',pointerEvents:'none',zIndex:'50'}});
  const ps=new ParticleSystem(canvas);

  // Question area
  const qArea=el('div',{style:{padding:'70px 20px 20px',transition:'opacity .5s ease'}});

  // Progress dots
  const dots=el('div',{style:{display:'flex',gap:'8px',justifyContent:'center',marginBottom:'14px'}});
  for(let i=0;i<5;i++){
    const dot=el('div',{style:{
      width:i===4?'12px':'8px',height:i===4?'12px':'8px',borderRadius:'10px',
      background:C.teal,transition:'all .3s ease',
      boxShadow:i===4?`0 0 0 4px rgba(45,212,191,.25)`:'none',
    }});
    if(i===4)dot.style.animation='glowPulse 1s ease-in-out 3';
    dots.appendChild(dot);
  }
  qArea.appendChild(dots);
  qArea.appendChild(el('p',{style:{fontSize:'12px',fontWeight:'700',color:'#9CA3AF',textAlign:'center',textTransform:'uppercase',letterSpacing:'1px',margin:'0 0 10px'}},['Question 5 of 5']));
  qArea.appendChild(el('p',{style:{fontSize:'18px',fontWeight:'800',color:'#1A1A1A',textAlign:'center',lineHeight:'1.35',margin:'0 0 16px'}},['Which headline uses a loaded word?']));

  // Answer chips
  const answers=[
    {t:'"City announces new park plans"',ok:false},
    {t:'"Mayor slams opposition in heated debate"',ok:true},
    {t:'"School board reviews budget proposal"',ok:false},
    {t:'"Weather expected to change this week"',ok:false},
  ];
  const chips=[];
  answers.forEach((a,i)=>{
    const chip=el('div',{style:{
      padding:'15px 18px',marginBottom:'8px',borderRadius:'16px',fontSize:'15px',fontWeight:'600',color:'#1A1A1A',
      background:'#FFF',border:'2px solid #E5E7EB',position:'relative',overflow:'hidden',
      transition:'all .45s cubic-bezier(.22,1.5,.36,1)',
    }},[a.t]);
    chips.push({el:chip,ok:a.ok});
    qArea.appendChild(chip);
  });

  // Result card
  const result=el('div',{style:{
    position:'absolute',bottom:'0',left:'0',right:'0',zIndex:'10',
    background:'#FFF',borderRadius:'28px 28px 0 0',padding:'28px 24px 40px',
    boxShadow:'0 -16px 60px rgba(0,0,0,.12)',textAlign:'center',
    transform:'translateY(100%)',transition:'transform .6s cubic-bezier(.22,1.5,.36,1)',
  }});

  // Score ring SVG
  const scoreNum=el('span',{style:{fontSize:'38px',fontWeight:'900',color:'#1A1A1A'}},['72']);
  const ringCircle=document.createElementNS('http://www.w3.org/2000/svg','circle');
  const circ=2*Math.PI*56;

  result.innerHTML=`
    <p style="font-size:12px;font-weight:800;color:${C.teal};text-transform:uppercase;letter-spacing:1.5px;margin:0 0 18px">Quiz Passed</p>
    <div style="position:relative;width:140px;height:140px;margin:0 auto 20px">
      <svg width="140" height="140" viewBox="0 0 140 140" style="transform:rotate(-90deg)">
        <circle cx="70" cy="70" r="56" fill="none" stroke="#E5E7EB" stroke-width="8"/>
        <circle id="ring-prog" cx="70" cy="70" r="56" fill="none" stroke="${C.teal}" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ}" style="transition:stroke-dashoffset .03s linear"/>
      </svg>
      <div id="score-center" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span id="score-val" style="font-size:38px;font-weight:900;color:#1A1A1A">72</span>
        <span style="font-size:11px;font-weight:600;color:#9CA3AF">Verity Score</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:18px">
      ${[{l:'Correct',v:'5/5',c:C.teal},{l:'Time',v:'42s',c:'#9CA3AF'},{l:'Delta',v:'+12',c:C.mint}].map(s=>`
        <div style="flex:1;padding:10px 8px;background:#FAFAFA;border-radius:12px;text-align:center">
          <p style="font-size:18px;font-weight:900;color:${s.c};margin:0">${s.v}</p>
          <p style="font-size:11px;font-weight:600;color:#9CA3AF;margin:2px 0 0">${s.l}</p>
        </div>
      `).join('')}
    </div>
    <p style="font-size:15px;font-weight:600;color:#1A1A1A;margin:0 0 16px;line-height:1.4">You spotted a loaded headline on the first try.</p>
    <button style="width:100%;padding:15px 0;background:${C.teal};color:#FFF;border:none;border-radius:14px;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(45,212,191,.3)">Share result</button>
  `;

  screen.appendChild(qArea);
  screen.appendChild(result);
  screen.appendChild(canvas);

  // ── CHOREOGRAPHY ──
  // Phase 1: Correct chip highlights (500ms)
  setTimeout(()=>{
    chips.forEach(c=>{
      if(c.ok){
        c.el.style.background=C.tealLight;
        c.el.style.borderColor=C.teal;
        c.el.style.transform='scale(1.04)';
        // Check mark
        const check=el('div',{style:{
          position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%) scale(0)',
          width:'26px',height:'26px',borderRadius:'13px',background:C.teal,
          display:'flex',alignItems:'center',justifyContent:'center',
          transition:'transform .4s cubic-bezier(.22,1.5,.36,1)',
        }});
        check.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="#FFF" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
        c.el.style.position='relative';
        c.el.appendChild(check);
        setTimeout(()=>{check.style.transform='translateY(-50%) scale(1)';},100);
      }
    });
  },500);

  // Phase 2: Radial sweep on correct chip (900ms)
  setTimeout(()=>{
    chips.forEach(c=>{
      if(c.ok){
        const sweep=el('div',{style:{
          position:'absolute',inset:'0',borderRadius:'14px',
          background:`radial-gradient(circle at 50% 50%,${C.tealLight},transparent 70%)`,
          transform:'scale(0)',opacity:'.6',transition:'all .5s ease-out',
        }});
        c.el.appendChild(sweep);
        requestAnimationFrame(()=>{sweep.style.transform='scale(2.5)';sweep.style.opacity='0';});
      }
    });
  },900);

  // Phase 3: Fade question, show result (1400ms)
  setTimeout(()=>{qArea.style.opacity='.1';},1300);
  setTimeout(()=>{
    result.style.transform='translateY(0)';
    // Animate score 72→84
    let s=72;
    const si=setInterval(()=>{s++;document.getElementById('score-val').textContent=s;if(s>=84)clearInterval(si);},45);
    // Animate ring
    let r=0;
    const ri=setInterval(()=>{r+=1;
      const off=circ*(1-Math.min(r,84)/100);
      document.getElementById('ring-prog').setAttribute('stroke-dashoffset',off);
      if(r>=84)clearInterval(ri);
    },18);
  },1500);

  // Phase 4: Confetti explosion (2100ms)
  setTimeout(()=>{
    const cx=195,cy=500;
    ps.emit(Array.from({length:80},()=>ps.makeP(cx,cy,
      (Math.random()-.5)*10,-(Math.random()*8+3),
      colors[Math.floor(Math.random()*colors.length)],
      Math.random()*6+2,60+Math.random()*40,.12,.97,
      shapes[Math.floor(Math.random()*shapes.length)]
    )));
  },2100);
}
