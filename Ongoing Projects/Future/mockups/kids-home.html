<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kids Home — Verity Post for Kids</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="kid-body">
<div class="phone-frame">

  <div class="kid-band" style="background: #7c3aed;">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="exit">Exit</div>
    <div class="greeting">Hi, Maya! ☀️</div>
    <div class="sub">What do you want to explore today?</div>
  </div>

  <div class="kid-card">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <span>Find a story or topic</span>
    </div>
  </div>

  <div class="kid-streak">
    <div class="row">
      <div class="flame" aria-hidden="true">🔥</div>
      <div class="stats">
        <span class="count">12</span><span class="label">day streak</span>
        <div class="hint">Keep it going today — you're almost at two weeks!</div>
      </div>
    </div>
    <div class="dots">
      <div class="day"><div class="pip"></div><div class="d">M</div></div>
      <div class="day"><div class="pip"></div><div class="d">T</div></div>
      <div class="day"><div class="pip"></div><div class="d">W</div></div>
      <div class="day"><div class="pip"></div><div class="d">T</div></div>
      <div class="day"><div class="pip"></div><div class="d">F</div></div>
      <div class="day"><div class="pip" style="box-shadow: 0 0 0 6px rgba(124,58,237,0.15);"></div><div class="d">S</div></div>
      <div class="day empty"><div class="pip"></div><div class="d">S</div></div>
    </div>
  </div>

  <div class="kid-section-label">Explore</div>

  <div class="kid-categories">
    <div class="kid-tile" style="background: #10b981;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">Science</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div class="on"></div><div class="on"></div><div class="on"></div><div class="on"></div><div></div>
      </div>
    </div>
    <div class="kid-tile" style="background: #3b82f6;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">Space</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div class="on"></div><div class="on"></div><div></div><div></div><div></div>
      </div>
    </div>
    <div class="kid-tile" style="background: #f59e0b;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">Animals</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div class="on"></div><div class="on"></div><div class="on"></div><div class="on"></div><div class="on"></div>
      </div>
    </div>
    <div class="kid-tile" style="background: #ec4899;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">History</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div class="on"></div><div></div><div></div><div></div><div></div>
      </div>
    </div>
    <div class="kid-tile" style="background: #8b5cf6;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">Art</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div class="on"></div><div class="on"></div><div class="on"></div><div></div><div></div>
      </div>
    </div>
    <div class="kid-tile" style="background: #0ea5e9;">
      <div class="deco deco-1"></div>
      <div class="deco deco-2"></div>
      <div class="t-name">World</div>
      <div class="t-sub">Explore</div>
      <div class="trail">
        <div></div><div></div><div></div><div></div><div></div>
      </div>
    </div>
  </div>

  <div style="height: 100px;"></div>

  <div class="kid-tab">
    <div class="t active">Home</div>
    <div class="t">Ranks</div>
    <div class="t">Me</div>
  </div>

</div>

<div style="text-align: center; padding-bottom: 40px;">
  <a href="index.html" style="color: var(--neutral-500); font-family: var(--font-sans); font-size: 13px;">← Back to gallery</a>
</div>
</body>
</html>
