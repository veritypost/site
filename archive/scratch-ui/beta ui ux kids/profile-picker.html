<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile picker · Kids UX Beta</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<a class="shell-back" href="index.html">All prototypes</a>

<div class="phone">
  <div class="picker-wrap">
    <div class="eyebrow">Verity Post Kids</div>
    <h1>Who's reading<br>today?</h1>
    <p class="q">Pick a profile to get started. Switching needs a parent PIN.</p>

    <div class="who-list">
      <a class="who" href="kid-home.html">
        <div class="av" style="background:#8b5cf6;">M</div>
        <div>
          <div class="nm">Maya</div>
          <div class="role">Kid · 10 years old</div>
        </div>
        <div class="arrow">&rsaquo;</div>
      </a>
      <a class="who" href="kid-home.html">
        <div class="av" style="background:#10b981;">J</div>
        <div>
          <div class="nm">Jordan</div>
          <div class="role">Kid · 8 years old</div>
        </div>
        <div class="arrow">&rsaquo;</div>
      </a>
      <a class="who" href="kid-home.html">
        <div class="av" style="background:#f59e0b;">A</div>
        <div>
          <div class="nm">Alex</div>
          <div class="role">Kid · 11 years old</div>
        </div>
        <div class="arrow">&rsaquo;</div>
      </a>
    </div>
  </div>
</div>
</body>
</html>
