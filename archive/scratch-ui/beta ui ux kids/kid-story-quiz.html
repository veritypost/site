<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quiz · Kids UX Beta</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body style="--accent:#10b981;">
<a class="shell-back" href="index.html">All prototypes</a>

<div class="phone">
  <div class="quiz-wrap">
    <div class="meter">
      <div class="mc done"></div>
      <div class="mc done"></div>
      <div class="mc active"></div>
      <div class="mc"></div>
      <div class="mc"></div>
    </div>

    <div class="q-index">Question 3 of 5 · Nature</div>
    <div class="q-prompt">What is the mycelium network, actually?</div>

    <div class="choices">
      <button class="choice">
        <div class="k">A</div>
        <span>A kind of mushroom people eat</span>
      </button>
      <button class="choice right">
        <div class="k">B</div>
        <span>Underground fungal threads that connect trees</span>
      </button>
      <button class="choice">
        <div class="k">C</div>
        <span>A computer network in national parks</span>
      </button>
      <button class="choice">
        <div class="k">D</div>
        <span>Moss that grows on tree trunks</span>
      </button>
    </div>

    <div class="explain">
      <div class="lbl">Why it's B</div>
      <p>Mycelium is a web of super-thin fungal threads living underground. It's what connects trees and moves food and messages between them — that's the whole point of the story.</p>
      <div class="advance">Tap anywhere to continue</div>
    </div>
  </div>

  <a href="kid-story-done.html" style="position:absolute;inset:0;"></a>
</div>
</body>
</html>
