        {!expanded&&<button onClick={()=>setExpanded(true)} style={{width:"100%",padding:"10px 0",background:"transparent",border:"none",fontSize:13,fontWeight:600,color:T.dim,cursor:"pointer",fontFamily:"inherit"}}>See all plans</button>}
        {expanded&&<div style={{animation:"fadeSlideUp .3s ease-out"}}>
          {["Family $9.99/mo","Student $2.49/mo"].map((p,i)=><div key={i} style={{padding:14,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,marginBottom:6,fontSize:14,fontWeight:600,color:T.text}}>{p}</div>)}
        </div>}
        {/* Trial timeline */}
        <div style={{background:"#F9FAFB",borderRadius:12,padding:16,marginTop:12}}>
          <p style={{fontSize:11,fontWeight:700,color:T.dim,textTransform:"uppercase",letterSpacing:.8,margin:"0 0 12px"}}>Your trial timeline</p>
          {[
            {day:"Today",desc:"Full access starts now",dot:T.accent,active:true},
            {day:"Day 5",desc:"Reminder email",dot:T.dim,active:false},
            {day:"Day 7",desc:"Subscription begins",dot:T.dim,active:false},
          ].map((s,i)=><div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:i<2?16:0,position:"relative"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:10,height:10,borderRadius:5,background:s.dot,animation:s.active?"pulseRing 2s infinite":"none"}}/>
              {i<2&&<div style={{width:2,height:24,background:T.border,marginTop:4}}/>}
            </div>
            <div>
              <p style={{fontSize:13,fontWeight:700,color:s.active?T.text:T.dim,margin:0}}>{s.day}</p>
              <p style={{fontSize:12,color:T.dim,margin:"2px 0 0"}}>{s.desc}</p>
            </div>
          </div>)}
        </div>
        <div style={{textAlign:"center",marginTop:12}}>
          <button style={{fontSize:13,fontWeight:600,color:T.dim,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>Restore purchase</button>
        </div>
        <p style={{fontSize:11,color:T.success,textAlign:"center",marginTop:12,fontWeight:600}}>Proposed: 2 defaults, trial timeline, expandable, restore visible</p>
      </div>
    )}
  </div>;
}

// ── 5. LEADERBOARD FIX ─────────────────────────────────────────────────
function LeaderboardFix(){
  const[showOld,setShowOld]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setShowOld(false),2000);return()=>clearTimeout(t);},[]);
  const rows=[
    {name:"Alex R.",score:2840,rank:1},
    {name:"Jordan T.",score:2715,rank:2},
    {name:"Sam K.",score:2690,rank:3},
    {name:"Casey P.",score:2410,rank:4},
    {name:"Morgan L.",score:2380,rank:5},
  ];
  return <div>
    <div style={{display:"flex",gap:8,padding:"12px 20px",justifyContent:"center"}}>
      <button onClick={()=>setShowOld(true)} style={{padding:"6px 16px",borderRadius:100,border:`1.5px solid ${showOld?T.accent:T.border}`,background:showOld?T.accent:"transparent",color:showOld?"#FFF":T.dim,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Current</button>
      <button onClick={()=>setShowOld(false)} style={{padding:"6px 16px",borderRadius:100,border:`1.5px solid ${!showOld?T.accent:T.border}`,background:!showOld?T.accent:"transparent",color:!showOld?"#FFF":T.dim,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Proposed</button>
    </div>
    {showOld ? (
      <div style={{padding:"0 20px",animation:"fadeSlideUp .3s ease-out"}}>
        <p style={{fontSize:17,fontWeight:800,color:T.text,margin:"0 0 16px"}}>Top Readers</p>
        {rows.map(r=><div key={r.rank} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`,filter:"blur(6px)",userSelect:"none"}}>
          <span style={{fontSize:14,fontWeight:800,color:T.dim,width:20}}>{r.rank}</span>
          <div style={{width:32,height:32,borderRadius:16,background:"#E5E7EB"}}/>
          <span style={{flex:1,fontSize:14,fontWeight:600}}>{r.name}</span>
          <span style={{fontSize:16,fontWeight:800}}>{r.score}</span>
        </div>)}
        <div style={{textAlign:"center",marginTop:20}}>
          <p style={{fontSize:14,fontWeight:600,color:T.dim}}>Sign in to see the leaderboard</p>
        </div>
        <p style={{fontSize:11,color:T.error,textAlign:"center",marginTop:12,fontWeight:600}}>Current: blur reads as hostility</p>
      </div>
    ) : (
      <div style={{padding:"0 20px",animation:"fadeSlideUp .3s ease-out"}}>
        <p style={{fontSize:17,fontWeight:800,color:T.text,margin:"0 0 4px"}}>Top Readers This Week</p>
        <p style={{fontSize:13,color:T.dim,margin:"0 0 16px"}}>Sign in to see who's who, and show up here yourself.</p>
        {rows.map(r=><div key={r.rank} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
          <span style={{fontSize:14,fontWeight:800,color:r.rank<=3?T.accent:T.dim,width:20}}>{r.rank}</span>
          <div style={{width:32,height:32,borderRadius:16,background:r.rank<=3?"#E5E7EB":"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {r.rank<=3?<svg width="14" height="14" viewBox="0 0 24 24"><circle cx="12" cy="10" r="4" fill="#D1D5DB"/><path d="M6 20c0-3 2.7-5 6-5s6 2 6 5" fill="#D1D5DB"/></svg>:<span style={{fontSize:12,fontWeight:700,color:T.dim}}>{r.name[0]}</span>}
          </div>
          <span style={{flex:1,fontSize:14,fontWeight:600,color:r.rank<=3?T.dim:T.text}}>{r.rank<=3?"Reader":r.name}</span>
          <span style={{fontSize:16,fontWeight:800,color:T.text}}>{r.score}</span>
        </div>)}
        {/* Your rank CTA */}
        <div style={{background:T.card,borderRadius:12,padding:14,marginTop:16,border:`1px solid ${T.border}`,textAlign:"center"}}>
          <p style={{fontSize:13,fontWeight:600,color:T.text,margin:"0 0 8px"}}>Where do you rank?</p>
          <button style={{padding:"10px 24px",background:T.accent,color:"#FFF",border:"none",borderRadius:100,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Sign in to find out</button>
        </div>
        <p style={{fontSize:11,color:T.success,textAlign:"center",marginTop:12,fontWeight:600}}>Proposed: show shape, gray top-3 avatars, identity-anchored CTA</p>
      </div>
    )}
  </div>;
}

// ── 6. HOUSE AD ────────────────────────────────────────────────────────

    {/* Regular story cards */}
    {[1,2].map(i=><div key={i} style={{background:T.card,borderRadius:12,padding:14,border:`1px solid ${T.border}`,marginBottom:10}}>
      <div style={{width:"60%",height:10,borderRadius:4,background:"#E5E7EB",marginBottom:8}}/>
      <div style={{width:"90%",height:14,borderRadius:4,background:"#D1D5DB",marginBottom:6}}/>
      <div style={{width:"40%",height:10,borderRadius:4,background:"#E5E7EB"}}/>
    </div>)}
    {/* Third-party ad */}
    <div style={{background:"#F3F4F6",borderRadius:12,padding:14,border:`1px dashed ${T.dim}`,marginBottom:10,textAlign:"center"}}>
      <p style={{fontSize:11,fontWeight:600,color:T.dim,margin:"0 0 4px"}}>AD SLOT</p>
      <p style={{fontSize:13,fontWeight:500,color:T.dim,margin:0}}>Third-party advertisement</p>
    </div>
    {/* More cards */}
    {[3,4].map(i=><div key={i} style={{background:T.card,borderRadius:12,padding:14,border:`1px solid ${T.border}`,marginBottom:10}}>
      <div style={{width:"55%",height:10,borderRadius:4,background:"#E5E7EB",marginBottom:8}}/>
      <div style={{width:"85%",height:14,borderRadius:4,background:"#D1D5DB",marginBottom:6}}/>
      <div style={{width:"35%",height:10,borderRadius:4,background:"#E5E7EB"}}/>
    </div>)}
    {/* HOUSE AD — the proposed self-served card */}
    <div style={{background:T.card,borderRadius:16,padding:20,border:`1.5px solid ${T.accent}`,marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,.04)"}}>
      <p style={{fontSize:15,fontWeight:700,color:T.text,margin:"0 0 6px"}}>Reading ad-free on Verity</p>
      <p style={{fontSize:13,color:T.dim,lineHeight:1.5,margin:"0 0 14px"}}>Your feed, uninterrupted. No banner ads, no pop-ups.</p>
      <div style={{display:"flex",gap:8}}>
        <button style={{flex:1,padding:"10px 0",background:T.accent,color:"#FFF",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Try 7 days free</button>
        <button style={{flex:1,padding:"10px 0",background:"transparent",border:`1.5px solid ${T.border}`,borderRadius:10,fontWeight:600,fontSize:13,color:T.dim,cursor:"pointer",fontFamily:"inherit"}}>Not now</button>
      </div>
    </div>
    {/* More cards */}
    <div style={{background:T.card,borderRadius:12,padding:14,border:`1px solid ${T.border}`,marginBottom:10}}>
      <div style={{width:"50%",height:10,borderRadius:4,background:"#E5E7EB",marginBottom:8}}/>
      <div style={{width:"80%",height:14,borderRadius:4,background:"#D1D5DB",marginBottom:6}}/>
      <div style={{width:"45%",height:10,borderRadius:4,background:"#E5E7EB"}}/>
    </div>
    <p style={{fontSize:11,color:T.success,textAlign:"center",marginTop:8,fontWeight:600}}>Every 3rd ad slot becomes a house ad — same dimensions, quiet tone</p>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
