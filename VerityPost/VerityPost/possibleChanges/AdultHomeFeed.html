<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Adult Home Feed — VerityPost Mockups</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;box-sizing:border-box}
body{background:#F5F5F5;font-family:-apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif}
@keyframes skeletonShimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const T={bg:"#FAFAFA",card:"#FFF",text:"#1A1A1A",dim:"#8E8E93",border:"#E5E5EA",accent:"#000",success:"#22C55E",teal:"#2DD4BF"};

function App(){
  const[view,setView]=useState("feed");
  const views=[{id:"feed",label:"Home Feed"},{id:"skeleton",label:"Skeleton Load"},{id:"verity5",label:"Verity Five"},{id:"article",label:"Article View"}];

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px"}}>
    <div style={{textAlign:"center",marginBottom:24}}>
      <h1 style={{fontSize:28,fontWeight:800,color:T.text,margin:0,letterSpacing:-.5}}>Adult Home Feed</h1>
      <p style={{fontSize:14,color:T.dim,margin:"6px 0 0",fontWeight:500}}>Editorial hierarchy with NYT ribbon nav</p>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:24}}>
      {views.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{background:view===v.id?T.accent:T.card,color:view===v.id?"#FFF":T.text,border:`2px solid ${view===v.id?T.accent:T.border}`,borderRadius:100,padding:"10px 18px",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",transition:"all .2s ease"}}>{v.label}</button>)}
    </div>
    {/* Phone */}
    <div style={{width:375,height:740,background:T.bg,borderRadius:44,border:"3px solid #E5E5EA",overflow:"hidden",position:"relative",boxShadow:"0 25px 60px rgba(0,0,0,.12)"}}>
      <div style={{height:58,background:"#FFF",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:6,borderBottom:`1px solid ${T.border}`}}>
        <div style={{width:126,height:32,borderRadius:16,background:"#111",boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}/>
      </div>
      <div style={{height:616,overflowY:"auto",position:"relative"}}>
        {view==="feed"&&<HomeFeed/>}
        {view==="skeleton"&&<SkeletonFeed/>}
        {view==="verity5"&&<VerityFive/>}
        {view==="article"&&<ArticleView/>}
      </div>
      {/* Tab Bar */}
      <div style={{height:66,display:"flex",alignItems:"center",justifyContent:"space-around",background:"#FFF",borderTop:`1px solid ${T.border}`,padding:"0 16px",position:"absolute",bottom:0,left:0,right:0}}>
        {["Home","Search","Profile","Settings"].map((t,i)=><div key={t} style={{textAlign:"center",flex:1}}>
          <span style={{fontSize:10,fontWeight:i===0?700:500,color:i===0?T.accent:T.dim}}>{t}</span>
        </div>)}
      </div>
    </div>
  </div>;
}

// ── HOME FEED ──────────────────────────────────────────────────────────
function HomeFeed(){
  const[activeSection,setActiveSection]=useState(0);
  const sections=["For You","World","Tech","Science","Business","Culture","Sports"];

  const stories=[
    {eyebrow:"INVESTIGATIONS",headline:"Inside the Carbon Credit Market's Hidden Networks",deck:"A three-month investigation reveals how carbon offsets are traded through shell companies.",byline:"Sarah Mitchell",time:"3h",quiz:true,feature:true},
    {eyebrow:"WORLD NEWS",headline:"Climate Summit Reaches Historic Agreement on Carbon Credits",deck:null,byline:"James Chen",time:"1h",quiz:true,feature:false},
    {eyebrow:"TECHNOLOGY",headline:"Apple's AI Strategy Shifts Toward On-Device Processing",deck:null,byline:"Priya Sharma",time:"4h",quiz:false,feature:false},
    {eyebrow:"ANALYSIS",headline:"What the Fed's Latest Signal Means for Housing",deck:null,byline:"Michael Torres",time:"6h",quiz:true,feature:false},
  ];

  return <div style={{paddingBottom:80}}>
    {/* Wordmark */}
    <div style={{padding:"16px 20px 0",textAlign:"center"}}>
      <p style={{fontSize:22,fontWeight:900,color:T.accent,letterSpacing:-0.5,margin:0}}>VerityPost</p>
    </div>

    {/* NYT Ribbon Nav */}
    <div style={{padding:"14px 0 0",borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:"flex",gap:0,overflowX:"auto",padding:"0 20px",scrollbarWidth:"none"}}>
        {sections.map((s,i)=><button key={s} onClick={()=>setActiveSection(i)} style={{
          padding:"8px 16px 12px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"inherit",
          fontSize:14,fontWeight:activeSection===i?700:400,color:activeSection===i?T.accent:T.dim,
          borderBottom:activeSection===i?`2px solid ${T.accent}`:"2px solid transparent",
          whiteSpace:"nowrap",transition:"all .2s ease",marginBottom:-1,
        }}>{s}</button>)}
      </div>
    </div>

    {/* Feature story */}
    <div style={{padding:"20px 20px 0",animation:"fadeIn .4s ease-out"}}>
      <div style={{background:T.card,borderRadius:16,padding:20,border:`1px solid ${T.border}`,boxShadow:"0 2px 12px rgba(0,0,0,.04)",marginBottom:14}}>
        <p style={{fontSize:11,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",color:T.dim,margin:"0 0 8px"}}>{stories[0].eyebrow}</p>
        <p style={{fontSize:22,fontWeight:700,color:T.text,lineHeight:1.2,margin:"0 0 8px",letterSpacing:-0.3}}>{stories[0].headline}</p>
        <p style={{fontSize:15,fontWeight:400,color:T.dim,lineHeight:1.45,margin:"0 0 12px"}}>{stories[0].deck}</p>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <p style={{fontSize:13,fontWeight:500,color:T.dim,margin:0,letterSpacing:0.2}}>By {stories[0].byline}  ·  {stories[0].time}</p>
          {stories[0].quiz&&<span style={{fontSize:11,fontWeight:600,color:T.accent,background:"#F3F4F6",padding:"3px 8px",borderRadius:4}}>Quiz</span>}
        </div>
      </div>
    </div>

    {/* Dense cards */}
    <div style={{padding:"0 20px"}}>
      {stories.slice(1).map((s,i)=><div key={i} style={{
        background:T.card,borderRadius:12,padding:14,marginBottom:8,
        border:`1px solid ${T.border}`,
        animation:`fadeIn .4s ease-out ${0.1+i*0.08}s both`,
      }}>
        <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
          <div style={{flex:1}}>
            <p style={{fontSize:11,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",color:T.dim,margin:"0 0 4px"}}>{s.eyebrow}</p>
            <p style={{fontSize:17,fontWeight:600,color:T.text,lineHeight:1.3,margin:"0 0 6px"}}>{s.headline}</p>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <p style={{fontSize:13,fontWeight:500,color:T.dim,margin:0}}>{s.byline}  ·  {s.time}</p>
              {s.quiz&&<span style={{fontSize:10,fontWeight:600,color:T.accent,background:"#F3F4F6",padding:"2px 6px",borderRadius:4}}>Quiz</span>}
            </div>
          </div>
          {/* Thumbnail placeholder */}
          <div style={{width:72,height:72,borderRadius:8,background:"#E5E7EB",flexShrink:0}}/>
        </div>
      </div>)}
    </div>

    {/* House ad */}
    <div style={{padding:"4px 20px 0"}}>
      <div style={{background:T.card,borderRadius:12,padding:16,border:`1.5px solid ${T.accent}`,marginBottom:8}}>
        <p style={{fontSize:14,fontWeight:700,color:T.text,margin:"0 0 4px"}}>Reading ad-free on Verity</p>
        <p style={{fontSize:12,color:T.dim,margin:"0 0 10px"}}>Your feed, uninterrupted.</p>
        <div style={{display:"flex",gap:8}}>
          <button style={{flex:1,padding:"8px 0",background:T.accent,color:"#FFF",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Try 7 days free</button>
          <button style={{flex:0,padding:"8px 12px",background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,fontWeight:600,fontSize:12,color:T.dim,cursor:"pointer",fontFamily:"inherit"}}>Not now</button>
        </div>
      </div>
    </div>

    {/* More stories */}
    <div style={{padding:"0 20px"}}>
      {[
        {e:"SCIENCE",h:"New CRISPR Technique Shows Promise for Sickle Cell",by:"Dr. Lisa Park",t:"8h"},
        {e:"CULTURE",h:"Why Museums Are Rethinking Their Digital Collections",by:"Tom Wright",t:"12h"},
      ].map((s,i)=><div key={i} style={{background:T.card,borderRadius:12,padding:14,marginBottom:8,border:`1px solid ${T.border}`}}>
        <p style={{fontSize:11,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",color:T.dim,margin:"0 0 4px"}}>{s.e}</p>
        <p style={{fontSize:17,fontWeight:600,color:T.text,lineHeight:1.3,margin:"0 0 6px"}}>{s.h}</p>
        <p style={{fontSize:13,fontWeight:500,color:T.dim,margin:0}}>{s.by}  ·  {s.t}</p>
      </div>)}
    </div>
  </div>;
}

// ── SKELETON FEED ──────────────────────────────────────────────────────
function SkeletonFeed(){
  const shimmer={background:"linear-gradient(90deg,#E5E7EB 25%,#F3F4F6 50%,#E5E7EB 75%)",backgroundSize:"200% 100%",animation:"skeletonShimmer 1.5s infinite",borderRadius:4};
  return <div style={{padding:"16px 20px 80px"}}>
    <div style={{textAlign:"center",marginBottom:14}}>
      <div style={{...shimmer,width:120,height:22,margin:"0 auto",borderRadius:6}}/>
    </div>
    {/* Ribbon skeleton */}
    <div style={{display:"flex",gap:12,marginBottom:16,padding:"0 0 12px",borderBottom:`1px solid ${T.border}`}}>
      {[60,50,40,55,70,45].map((w,i)=><div key={i} style={{...shimmer,width:w,height:14}}/>)}
    </div>
    {/* Feature card skeleton */}
    <div style={{background:T.card,borderRadius:16,padding:20,marginBottom:14,border:`1px solid ${T.border}`}}>
      <div style={{...shimmer,width:80,height:10,marginBottom:10}}/>
      <div style={{...shimmer,width:"90%",height:18,marginBottom:8}}/>
      <div style={{...shimmer,width:"70%",height:18,marginBottom:10}}/>
      <div style={{...shimmer,width:"100%",height:12,marginBottom:6}}/>
      <div style={{...shimmer,width:"60%",height:12,marginBottom:10}}/>
      <div style={{...shimmer,width:120,height:10}}/>
    </div>
    {/* Dense card skeletons */}
    {[0,1,2].map(i=><div key={i} style={{background:T.card,borderRadius:12,padding:14,marginBottom:8,border:`1px solid ${T.border}`,display:"flex",gap:12}}>
      <div style={{flex:1}}>
        <div style={{...shimmer,width:60,height:9,marginBottom:8}}/>
        <div style={{...shimmer,width:"95%",height:14,marginBottom:6}}/>
        <div style={{...shimmer,width:"70%",height:14,marginBottom:8}}/>
        <div style={{...shimmer,width:100,height:10}}/>
      </div>
      <div style={{...shimmer,width:72,height:72,borderRadius:8,flexShrink:0}}/>
    </div>)}
    <p style={{fontSize:11,color:T.success,textAlign:"center",marginTop:16,fontWeight:600}}>Skeleton loading replaces spinners everywhere. Uses .redacted(reason: .placeholder) + shimmer.</p>
  </div>;
}

// ── VERITY FIVE ────────────────────────────────────────────────────────
function VerityFive(){
  const[revealed,setRevealed]=useState(0);
  useEffect(()=>{
    const iv=setInterval(()=>setRevealed(r=>{if(r>=5){clearInterval(iv);return 5;}return r+1;}),400);
    return()=>clearInterval(iv);
  },[]);

  const stories=[
    {num:1,headline:"Climate Summit's Carbon Credit Deal Explained",tag:"World"},
    {num:2,headline:"The Hidden Cost of Cheap Groceries",tag:"Investigations"},
    {num:3,headline:"Why Your Phone Battery Dies Faster in Cold Weather",tag:"Science"},
    {num:4,headline:"A Small Town's Fight Against a Tech Giant",tag:"Business"},
    {num:5,headline:"The Art Museum That Lives Entirely Online",tag:"Culture"},
  ];

  return <div style={{padding:"16px 20px 80px"}}>
    {/* Header */}
    <div style={{textAlign:"center",marginBottom:20}}>
      <p style={{fontSize:11,fontWeight:700,color:T.dim,textTransform:"uppercase",letterSpacing:1.2,margin:"0 0 6px"}}>Daily</p>
      <p style={{fontSize:28,fontWeight:900,color:T.accent,letterSpacing:-0.5,margin:"0 0 4px"}}>The Verity Five</p>
      <p style={{fontSize:13,color:T.dim,fontWeight:500}}>Five stories. Hand-picked. Read them all.</p>
    </div>

    {stories.map((s,i)=><div key={s.num} style={{
      opacity:i<revealed?1:0.15,
      transform:i<revealed?"translateX(0)":"translateX(8px)",
      transition:"all .4s cubic-bezier(0.34,1.56,0.64,1)",
      transitionDelay:`${i*0.05}s`,
      display:"flex",gap:14,alignItems:"flex-start",
      padding:"14px 0",borderBottom:i<4?`1px solid ${T.border}`:"none",
    }}>
      <span style={{
        fontSize:28,fontWeight:900,color:i<revealed?T.accent:"#E5E7EB",
        lineHeight:1,minWidth:28,textAlign:"center",
        transition:"color .3s ease",
      }}>{s.num}</span>
      <div style={{flex:1}}>
        <p style={{fontSize:17,fontWeight:600,color:T.text,lineHeight:1.3,margin:"0 0 4px"}}>{s.headline}</p>
        <p style={{fontSize:11,fontWeight:600,color:T.dim,textTransform:"uppercase",letterSpacing:0.5}}>{s.tag}</p>
      </div>
    </div>)}

    {/* Progress footer */}
    {revealed>=5&&<div style={{textAlign:"center",marginTop:20,animation:"fadeIn .5s ease-out"}}>
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:10}}>
        {[0,1,2,3,4].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:T.accent}}/>)}
      </div>
      <p style={{fontSize:14,fontWeight:600,color:T.text}}>Read all five to complete your daily ritual</p>
      <p style={{fontSize:12,color:T.dim,marginTop:4}}>This feeds your streak</p>
    </div>}

    <p style={{fontSize:11,color:T.success,textAlign:"center",marginTop:20,fontWeight:600}}>The Browser pattern: scarcity creates ritual, ritual compounds streaks</p>
  </div>;
}

// ── ARTICLE VIEW ───────────────────────────────────────────────────────
function ArticleView(){
  return <div style={{padding:"0 0 80px"}}>
    {/* Article header */}
    <div style={{padding:"20px 20px 16px",borderBottom:`1px solid ${T.border}`}}>
      <p style={{fontSize:11,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",color:T.dim,margin:"0 0 8px"}}>INVESTIGATIONS</p>
      <p style={{fontSize:22,fontWeight:700,color:T.text,lineHeight:1.2,margin:"0 0 10px",letterSpacing:-0.3}}>Inside the Carbon Credit Market's Hidden Networks</p>
      <p style={{fontSize:15,fontWeight:400,color:T.dim,lineHeight:1.4,margin:"0 0 14px"}}>A three-month investigation reveals how carbon offsets are traded through shell companies with minimal oversight.</p>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:32,height:32,borderRadius:16,background:"#E5E7EB"}}/>
        <div>
          <p style={{fontSize:13,fontWeight:500,color:T.text,margin:0,letterSpacing:0.2}}>Sarah Mitchell</p>
          <p style={{fontSize:11,color:T.dim,margin:"1px 0 0"}}>Investigations Desk  ·  12 min read</p>
        </div>
      </div>
    </div>

    {/* Labeled sections (Axios Smart Brevity) */}
    <div style={{padding:"20px 20px 0"}}>
      <div style={{marginBottom:20}}>
        <p style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px",borderLeft:`3px solid ${T.accent}`,paddingLeft:10}}>What happened</p>
        <p style={{fontSize:17,fontWeight:400,color:T.text,lineHeight:1.5,margin:0}}>World leaders gathered in Geneva yesterday to finalize what many are calling the most significant climate agreement since Paris 2015. The new framework establishes binding targets for carbon credit verification and introduces a centralized registry for all offset transactions.</p>
      </div>

      <div style={{marginBottom:20}}>
        <p style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px",borderLeft:`3px solid ${T.accent}`,paddingLeft:10}}>Why it matters</p>
        <p style={{fontSize:17,fontWeight:400,color:T.text,lineHeight:1.5,margin:0}}>The $2 billion carbon credit market has operated with minimal oversight since its inception. <strong>Our investigation found that roughly 40% of credits traded in 2025 were linked to projects that had ceased operations.</strong> The new framework requires third-party verification within 90 days of issuance.</p>
      </div>

      <div style={{marginBottom:20}}>
        <p style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px",borderLeft:"3px solid #8E8E93",paddingLeft:10}}>What's disputed</p>
        <p style={{fontSize:17,fontWeight:400,color:T.text,lineHeight:1.5,margin:0}}>Industry groups argue the verification timeline is too aggressive, citing concerns about creating bottlenecks that could freeze the market. Environmental organizations counter that the timeline is too lenient given the urgency of the climate crisis.</p>
      </div>

      <div style={{marginBottom:20}}>
        <p style={{fontSize:11,fontWeight:700,color:T.accent,textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px",borderLeft:"3px solid #E5E5EA",paddingLeft:10}}>Sources</p>
        <p style={{fontSize:13,fontWeight:400,color:T.dim,lineHeight:1.5,margin:0}}>Geneva Climate Office (primary documents), Carbon Trade Watch (industry data), interviews with 14 market participants conducted between January and March 2026.</p>
      </div>
    </div>

    <div style={{padding:"0 20px"}}>
      <div style={{background:"#F9FAFB",borderRadius:12,padding:16}}>
        <p style={{fontSize:11,color:T.success,fontWeight:700,margin:0}}>Proposed: Axios-style labeled sections as structural scaffolding. "What happened," "Why it matters," "What's disputed," "Sources." Bold at anchor points. 17pt body at 1.5 line-height.</p>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
