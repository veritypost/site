name: VerityPost
options:
  bundleIdPrefix: com.veritypost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0

targets:
  VerityPost:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VerityPost
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: VerityPost/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: "launchBackground"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - verity
            CFBundleURLName: com.veritypost.app
        # Allows KidsAppLauncher.canOpenURL("veritypostkids://...") to return
        # true when the kids app is installed. iOS 9+ requires every queried
        # scheme to be declared here, otherwise canOpenURL always returns false.
        LSApplicationQueriesSchemes:
          - veritypostkids
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        ITSAppUsesNonExemptEncryption: false
        # Q13: TTSPlayer configures AVAudioSession(.playback, .spokenAudio).
        # Without this declaration iOS suspends audio when the app is
        # backgrounded. `audio` covers TTS playback continuing off-screen.
        UIBackgroundModes:
          - audio
        # Supabase credentials are read from Info.plist at runtime via
        # SupabaseManager. These keys pass through to the plist as-is.
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_KEY: "$(SUPABASE_KEY)"
        VP_SITE_URL: "$(VP_SITE_URL)"
    entitlements:
      path: VerityPost/VerityPost.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.veritypost.app
        DEVELOPMENT_TEAM: FQCAS829U7
        CODE_SIGN_ENTITLEMENTS: VerityPost/VerityPost.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPABASE_URL: "https://fyiwulqphgmoqullmrfn.supabase.co"
        SUPABASE_KEY: "sb_publishable_cghQhP7iWFHIPAWnhsH3tw_COmnxYJG"
        VP_SITE_URL: "https://veritypost.com"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          SWIFT_COMPILATION_MODE: wholemodule

  VerityPostUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VerityPostUITests
    dependencies:
      - target: VerityPost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.veritypost.app.uitests
        TEST_TARGET_NAME: VerityPost
