name: VerityPostKids
options:
  bundleIdPrefix: com.veritypost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0

targets:
  VerityPostKids:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VerityPostKids
    dependencies:
      - package: Supabase
    info:
      path: VerityPostKids/Info.plist
      properties:
        CFBundleDisplayName: "Verity Post Kids"
        UILaunchScreen:
          UIColorName: "kidsLaunchBackground"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.veritypost.kids
            CFBundleURLSchemes:
              - veritypostkids
        ITSAppUsesNonExemptEncryption: false
        # Supabase credentials are read from Info.plist at runtime via
        # SupabaseKidsClient. The values are populated from build settings
        # (declared below) so the secrets aren't checked into the repo.
        # Anon publishable key is public by design (it ships in the adult
        # web bundle too, prefixed NEXT_PUBLIC_) — service-role key NEVER
        # goes here. Set SUPABASE_KEY / SUPABASE_URL / VP_SITE_URL via an
        # xcconfig or as Xcode build-setting overrides at build time.
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_KEY: "$(SUPABASE_KEY)"
        VP_SITE_URL: "$(VP_SITE_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.veritypost.kids
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Default values for local builds. CI / TestFlight / App Store
        # submissions can override these via xcconfig or `xcodebuild
        # SUPABASE_KEY=...` to keep the publishable key out of git history.
        # Only the publishable (anon) key belongs here — service-role key
        # is server-only and must never be set in either iOS target.
        SUPABASE_URL: "https://fyiwulqphgmoqullmrfn.supabase.co"
        SUPABASE_KEY: "sb_publishable_cghQhP7iWFHIPAWnhsH3tw_COmnxYJG"
        VP_SITE_URL: "https://veritypost.com"
