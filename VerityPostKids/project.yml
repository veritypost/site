name: VerityPostKids
options:
  bundleIdPrefix: com.veritypost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: "Verity Post Kids"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0

targets:
  VerityPostKids:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VerityPostKids
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.veritypost.kids
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Supabase — same project as adult app.
        # Anon key is public by design (ships in adult web too, prefix NEXT_PUBLIC_).
        # Service role key NEVER goes here.
        INFOPLIST_KEY_SUPABASE_URL: "https://fyiwulqphgmoqullmrfn.supabase.co"
        INFOPLIST_KEY_SUPABASE_KEY: "sb_publishable_cghQhP7iWFHIPAWnhsH3tw_COmnxYJG"
        INFOPLIST_KEY_VP_SITE_URL: "https://veritypost.com"
